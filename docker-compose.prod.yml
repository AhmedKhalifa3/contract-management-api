services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contract_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-contract_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contract_user} -d ${POSTGRES_DB:-contract_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-contract_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-contract_db}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_DIR: /var/log/app
    ports:
      - "5000:5000"
    volumes:
      - app_logs:/var/log/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  app_logs:
