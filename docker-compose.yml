services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: contract_pass
      POSTGRES_DB: contract_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contract_user -d contract_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      FLASK_ENV: development
      SECRET_KEY: dev
      # Container-to-container traffic uses the compose service name and
      # the container's own port (5432) — not the host-remapped 5433 from
      # .env, which only makes sense from outside Docker.
      DATABASE_URL: postgresql+psycopg2://contract_user:contract_pass@db:5432/contract_db
      # Compose auto-loads the root .env for ${...} substitution below
      # (separate from env_file:, which we don't use here) — leave the
      # var unset there and this defaults to empty, i.e. Sentry disabled.
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Structured JSON logs go here in addition to stdout; Filebeat tails
      # this file from the shared app_logs volume below.
      LOG_DIR: /var/log/app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - app_logs:/var/log/app
    depends_on:
      db:
        condition: service_healthy
    command: ["flask", "run", "--host=0.0.0.0", "--port=5000", "--debug"]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    environment:
      - discovery.type=single-node
      # Security/TLS disabled for local dev only — a real deployment would
      # need auth enabled and this stack would sit behind a VPC anyway.
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.1
    user: root
    command: ["--strict.perms=false"]
    volumes:
      - ./docker/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - app_logs:/var/log/app:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  esdata:
  app_logs:
  prometheus_data:
  grafana_data:
