name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: contract_user
          POSTGRES_PASSWORD: contract_pass
          POSTGRES_DB: contract_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contract_user -d contract_db_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Run migrations
        env:
          FLASK_APP: wsgi.py
          DATABASE_URL: postgresql+psycopg2://contract_user:contract_pass@localhost:5432/contract_db_test
        run: flask db upgrade

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://contract_user:contract_pass@localhost:5432/contract_db_test
        run: pytest -q

      - name: Build Docker image
        run: docker build -t contract-management-api:ci .

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd contract-management-api
            git pull origin main
            sudo docker compose -f docker-compose.prod.yml --env-file .env up -d --build
